<svg width="1600" height="400" viewBox="0 0 1600 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SynapSeq</title>
  <desc id="desc">Animated dark mode README banner using the SynapSeq warm color palette, with neural signal flow and minimal SynapSeq branding.</desc>

  <defs>
    <linearGradient id="bgBase" x1="800" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1714"/>
      <stop offset="1" stop-color="#161311"/>
    </linearGradient>

    <radialGradient id="tealAtmosphere" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 60) rotate(28) scale(470 240)">
      <stop offset="0" stop-color="#0f766e" stop-opacity="0.28"/>
      <stop offset="0.46" stop-color="#0f766e" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#0f766e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ochreAtmosphere" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1350 38) rotate(152) scale(470 220)">
      <stop offset="0" stop-color="#b45309" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#b45309" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="signalGradient" x1="280" y1="0" x2="1320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a06a" stop-opacity="0.1"/>
      <stop offset="0.2" stop-color="#0f766e" stop-opacity="0.82"/>
      <stop offset="0.52" stop-color="#c96a42" stop-opacity="0.95"/>
      <stop offset="0.78" stop-color="#c89a46" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#58a06a" stop-opacity="0.1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-220 0" to="220 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="lineGradient" x1="220" y1="0" x2="1380" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b8aa9a" stop-opacity="0.08"/>
      <stop offset="0.34" stop-color="#c96a42" stop-opacity="0.45"/>
      <stop offset="0.62" stop-color="#0f766e" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#b8aa9a" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="warmGlow" x="-160%" y="-160%" width="420%" height="420%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.79  0 1 0 0 0.42  0 0 1 0 0.26  0 0 0 0.78 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="16" r="1" fill="#f3eadf" opacity="0.05"/>
      <circle cx="35" cy="50" r="1" fill="#f3eadf" opacity="0.035"/>
      <circle cx="64" cy="22" r="1" fill="#c96a42" opacity="0.04"/>
    </pattern>

    <path id="wavePath" d="M-80 205 C 0 168, 80 242, 160 205 S 320 168, 400 205 S 560 242, 640 205 S 800 168, 880 205 S 1040 242, 1120 205 S 1280 168, 1360 205 S 1520 242, 1680 205"/>

    <style>
      .title {
        font: 800 76px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 14px;
      }
      .neural-line {
        stroke: url(#lineGradient);
        stroke-width: 2;
        stroke-linecap: round;
      }
      .node {
        fill: #261f1b;
        stroke: #c96a42;
        stroke-width: 2;
      }
      .node-teal { stroke: #0f766e; }
      .node-ochre { stroke: #c89a46; }
      .pulse {
        fill: #efb08d;
        filter: url(#warmGlow);
      }
      @media (prefers-reduced-motion: reduce) {
        animate, animateMotion, animateTransform { display: none; }
      }
    </style>
  </defs>

  <rect width="1600" height="400" fill="url(#bgBase)"/>
  <rect width="1600" height="400" fill="url(#tealAtmosphere)"/>
  <rect width="1600" height="400" fill="url(#ochreAtmosphere)"/>
  <rect width="1600" height="400" fill="url(#grain)" opacity="0.75"/>

  <rect x="42" y="38" width="1516" height="324" rx="34" fill="rgba(31, 26, 23, 0.82)" stroke="rgba(243, 234, 223, 0.12)"/>
  <rect x="68" y="64" width="1464" height="272" rx="28" fill="rgba(38, 32, 28, 0.46)" stroke="rgba(243, 234, 223, 0.08)"/>

  <g opacity="0.42">
    <use href="#wavePath" stroke="url(#signalGradient)" stroke-width="3" fill="none" filter="url(#softGlow)">
      <animateTransform attributeName="transform" type="translate" from="-160 0" to="160 0" dur="10s" repeatCount="indefinite"/>
    </use>
    <use href="#wavePath" stroke="#b8aa9a" stroke-opacity="0.10" stroke-width="1.5" fill="none" transform="translate(0 48)">
      <animateTransform attributeName="transform" type="translate" from="120 48" to="-120 48" dur="13s" repeatCount="indefinite"/>
    </use>
    <use href="#wavePath" stroke="#c96a42" stroke-opacity="0.12" stroke-width="2" fill="none" transform="translate(0 -48)">
      <animateTransform attributeName="transform" type="translate" from="-100 -48" to="100 -48" dur="12s" repeatCount="indefinite"/>
    </use>
  </g>

  <g opacity="0.88">
    <path class="neural-line" d="M350 254 L458 214 L566 252 L674 205 L782 247 L890 198 L998 248 L1106 215 L1214 250"/>
    <path class="neural-line" d="M350 146 L458 188 L566 145 L674 195 L782 152 L890 202 L998 152 L1106 185 L1214 146"/>
    <path class="neural-line" d="M350 146 L350 254 M458 188 L458 214 M566 145 L566 252 M674 195 L674 205 M782 152 L782 247 M890 202 L890 198 M998 152 L998 248 M1106 185 L1106 215 M1214 146 L1214 250"/>
    <path class="neural-line" d="M350 146 C470 108 570 112 674 195 S870 286 998 152 S1130 110 1214 146" opacity="0.48"/>
    <path class="neural-line" d="M350 254 C500 304 608 302 782 247 S1010 105 1214 250" opacity="0.48"/>
  </g>

  <g>
    <circle class="node node-teal" cx="350" cy="146" r="8"/>
    <circle class="node" cx="458" cy="188" r="8"/>
    <circle class="node node-ochre" cx="566" cy="145" r="8"/>
    <circle class="node" cx="674" cy="195" r="8"/>
    <circle class="node node-teal" cx="782" cy="152" r="8"/>
    <circle class="node" cx="890" cy="202" r="8"/>
    <circle class="node node-ochre" cx="998" cy="152" r="8"/>
    <circle class="node" cx="1106" cy="185" r="8"/>
    <circle class="node node-teal" cx="1214" cy="146" r="8"/>

    <circle class="node" cx="350" cy="254" r="8"/>
    <circle class="node node-ochre" cx="458" cy="214" r="8"/>
    <circle class="node node-teal" cx="566" cy="252" r="8"/>
    <circle class="node" cx="674" cy="205" r="8"/>
    <circle class="node node-ochre" cx="782" cy="247" r="8"/>
    <circle class="node node-teal" cx="890" cy="198" r="8"/>
    <circle class="node" cx="998" cy="248" r="8"/>
    <circle class="node node-ochre" cx="1106" cy="215" r="8"/>
    <circle class="node" cx="1214" cy="250" r="8"/>
  </g>

  <g>
    <circle class="pulse" r="5">
      <animateMotion dur="5.5s" repeatCount="indefinite" path="M350 254 L458 214 L566 252 L674 205 L782 247 L890 198 L998 248 L1106 215 L1214 250"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle class="pulse" r="4" fill="#58a06a">
      <animateMotion dur="7s" repeatCount="indefinite" path="M350 146 L458 188 L566 145 L674 195 L782 152 L890 202 L998 152 L1106 185 L1214 146"/>
      <animate attributeName="opacity" values="0;0.8;1;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle class="pulse" r="4" fill="#c89a46">
      <animateMotion dur="8s" repeatCount="indefinite" path="M350 146 C470 108 570 112 674 195 S870 286 998 152 S1130 110 1214 146"/>
      <animate attributeName="opacity" values="0;0.7;1;0" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
