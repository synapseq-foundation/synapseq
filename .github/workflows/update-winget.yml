name: Update WinGet Manifest

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to process, for example v4.1.0
        required: true
        type: string

concurrency:
  group: update-winget-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  update-winget:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.release.draft == false && github.event.release.prerelease == false) }}
    runs-on: windows-latest

    permissions:
      contents: read

    env:
      PACKAGE_IDENTIFIER: ruanklein.synapseq

    steps:
      - name: Extract release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
          }
          else {
            $tag = "${{ github.event.release.tag_name }}"
          }

          $version = $tag.TrimStart('v')
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"
          $x64Url = "$releaseUrl/synapseq-$tag-windows-amd64.zip"
          $arm64Url = "$releaseUrl/synapseq-$tag-windows-arm64.zip"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "x64_url=$x64Url" >> $env:GITHUB_OUTPUT
          "arm64_url=$arm64Url" >> $env:GITHUB_OUTPUT

      - name: Validate release assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const assets = (release.data.assets || []).map((asset) => asset.name);
            const expected = [
              `synapseq-${tag}-windows-amd64.zip`,
              `synapseq-${tag}-windows-arm64.zip`,
            ];

            const missing = expected.filter((name) => !assets.includes(name));
            if (missing.length > 0) {
              core.setFailed(`Missing release assets: ${missing.join(", ")}`);
            }

      - name: Setup .NET runtime
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Download wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Update WinGet manifest and submit PR
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          if (-not $env:WINGET_CREATE_GITHUB_TOKEN) {
            throw "The WINGET_CREATE_GITHUB_TOKEN secret is not configured."
          }

          ./wingetcreate.exe update $env:PACKAGE_IDENTIFIER `
            --version "${{ steps.meta.outputs.version }}" `
            --urls "${{ steps.meta.outputs.x64_url }}|x64" "${{ steps.meta.outputs.arm64_url }}|arm64" `
            --token $env:WINGET_CREATE_GITHUB_TOKEN `
            --submit
